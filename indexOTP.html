<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTP Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-50 p-4 font-sans antialiased text-gray-900">
    <div id="app" class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">ยืนยันตัวตน OTP</h1>
            <p class="text-sm text-gray-500 mt-1">กรุณากรอกรหัส 6 หลักเพื่อทำรายการ</p>
        </div>

        <!-- Loading State -->
        <div id="loading" class="mb-6 p-4 bg-blue-50 rounded-xl text-center">
            <p class="text-sm text-blue-600">⏳ กำลังโหลดข้อมูล...</p>
        </div>

        <!-- User Info -->
        <div id="userInfo" class="mb-6 p-4 bg-blue-50 rounded-xl hidden">
            <div class="flex justify-between mb-1">
                <span class="text-xs text-blue-600 uppercase font-semibold">ชื่อลูกค้า</span>
                <span id="name" class="text-sm font-bold text-blue-900">-</span>
            </div>
            <div class="flex justify-between">
                <span class="text-xs text-blue-600 uppercase font-semibold">ธนาคาร</span>
                <span id="bank" class="text-sm font-bold text-blue-900">-</span>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorInfo" class="mb-6 p-4 bg-red-50 rounded-xl hidden">
            <p class="text-sm text-red-600 text-center">❌ ไม่พบข้อมูล กรุณาติดต่อผู้ดูแล</p>
            <p id="debugInfo" class="text-xs text-red-400 text-center mt-1"></p>
        </div>

        <form id="otpForm" class="space-y-6">
            <div>
                <input 
                    type="text" 
                    id="otpInput" 
                    inputmode="numeric"
                    pattern="[0-9]*"
                    maxlength="6" 
                    placeholder="000000"
                    class="w-full text-center text-4xl font-mono tracking-[0.5em] py-4 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:ring-0 transition-all outline-none"
                    required
                >
            </div>

            <button 
                type="submit" 
                id="submitBtn"
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-200"
            >
                ยืนยันรหัส
            </button>
        </form>

        <p id="status" class="mt-4 text-center text-sm font-medium hidden"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const GET_INFO_URL = 'https://n8n-dev-uat.agilesoftgroup.com/webhook/otp-get-info';
        const WEBHOOK_URL  = 'https://n8n-dev-uat.agilesoftgroup.com/webhook/otp-receiver';

        const startParam = tg.initDataUnsafe?.start_param || '';
        const urlParams  = new URLSearchParams(window.location.search);
        const threadId   = startParam || urlParams.get('thread') || '';

        async function loadUserInfo() {
            try {
                const res = await fetch(GET_INFO_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ thread_id: threadId })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const text = await res.text();
                let data;
                try {
                    data = JSON.parse(text);
                    if (typeof data === 'string') data = JSON.parse(data);
                } catch {
                    throw new Error('parse error');
                }

                if (data && data.name) {
                    document.getElementById('name').textContent = data.name;
                    document.getElementById('bank').textContent = data.bank || 'ไม่ระบุ';
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                } else {
                    throw new Error('ไม่พบชื่อ');
                }
            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('errorInfo').classList.remove('hidden');
                document.getElementById('debugInfo').textContent = `thread_id: ${threadId} | ${err.message}`;
            }
        }

        loadUserInfo();

        // รับเฉพาะตัวเลขเท่านั้น
        const otpInput = document.getElementById('otpInput');
        otpInput.addEventListener('input', () => {
            otpInput.value = otpInput.value.replace(/[^0-9]/g, '');
        });

        const form   = document.getElementById('otpForm');
        const status = document.getElementById('status');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const otp = otpInput.value;
            const btn = document.getElementById('submitBtn');

            if (!/^\d{6}$/.test(otp)) return alert('กรุณากรอกรหัสตัวเลข 6 หลักเท่านั้น');

            btn.disabled    = true;
            btn.textContent = 'กำลังตรวจสอบ...';

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id:        threadId,
                        thread_id: threadId,
                        otp:       otp
                    })
                });

                if (response.ok) {
                    status.textContent = '✅ ส่งข้อมูลสำเร็จ! กำลังปิดหน้าต่าง...';
                    status.className   = 'mt-4 text-center text-sm font-medium text-green-600';
                    status.classList.remove('hidden');
                    setTimeout(() => tg.close(), 1500);
                } else {
                    throw new Error();
                }
            } catch (err) {
                btn.disabled    = false;
                btn.textContent = 'ลองใหม่อีกครั้ง';
                status.textContent = '❌ เกิดข้อผิดพลาด กรุณาลองใหม่';
                status.className   = 'mt-4 text-center text-sm font-medium text-red-600';
                status.classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
